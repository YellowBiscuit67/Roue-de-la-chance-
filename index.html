<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roue de la Chance</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Océan animé ── */
    .ocean-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -2;
      background: linear-gradient(180deg,
        #021b2a 0%,
        #04354d 10%,
        #065a78 25%,
        #0a7e9e 40%,
        #0ea5c4 55%,
        #18c5df 70%,
        #4dd9e8 82%,
        #8aeee6 92%,
        #c0f7f0 100%
      );
    }

    #oceanCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    /* ── Particules lumineuses (caustiques) ── */
    .caustic {
      position: fixed;
      border-radius: 50%;
      z-index: -1;
      pointer-events: none;
      animation: causticFloat linear infinite;
      mix-blend-mode: soft-light;
    }

    @keyframes causticFloat {
      0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
      10%  { opacity: 0.6; }
      50%  { transform: translateY(-60vh) translateX(30px) scale(1.2); opacity: 0.4; }
      90%  { opacity: 0.1; }
      100% { transform: translateY(-110vh) translateX(-20px) scale(0.6); opacity: 0; }
    }

    /* ── Bulles animées ── */
    .bubble {
      position: fixed;
      border-radius: 50%;
      z-index: -1;
      pointer-events: none;
      animation: bubbleRise linear infinite;
    }
    .bubble::after {
      content: '';
      position: absolute;
      top: 18%; left: 22%;
      width: 30%; height: 20%;
      border-radius: 50%;
      background: rgba(255,255,255,0.55);
      filter: blur(1px);
    }

    @keyframes bubbleRise {
      0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
      5%   { opacity: 0.7; }
      25%  { transform: translateY(-25vh) translateX(12px) scale(0.95); opacity: 0.6; }
      50%  { transform: translateY(-55vh) translateX(-8px) scale(0.85); opacity: 0.45; }
      75%  { transform: translateY(-80vh) translateX(15px) scale(0.7); opacity: 0.25; }
      100% { transform: translateY(-110vh) translateX(-5px) scale(0.5); opacity: 0; }
    }

    /* ── Rayons de lumière ── */
    .light-ray {
      position: fixed;
      top: -10%;
      width: 120px;
      height: 130%;
      z-index: -1;
      pointer-events: none;
      opacity: 0;
      transform-origin: top center;
      animation: rayPulse ease-in-out infinite;
    }

    @keyframes rayPulse {
      0%   { opacity: 0; transform: rotate(var(--ray-angle)) scaleX(0.8); }
      30%  { opacity: var(--ray-max-opacity); }
      70%  { opacity: var(--ray-max-opacity); }
      100% { opacity: 0; transform: rotate(var(--ray-angle)) scaleX(1.2); }
    }

    /* ── Body ── */
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      letter-spacing: -0.5px;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .subtitle {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.75);
      margin-bottom: 2rem;
    }

    .main-layout {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
      max-width: 1000px;
    }

    /* ── Wheel area ── */
    .wheel-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    .wheel-wrapper {
      position: relative;
      width: 360px;
      height: 360px;
    }

    #wheelCanvas {
      display: block;
      border-radius: 50%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25), 0 0 60px rgba(20,163,184,0.3);
    }

    .pointer {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-top: 36px solid #fff;
      filter: drop-shadow(0 3px 8px rgba(0,0,0,0.35));
      z-index: 10;
    }

    .spin-btn {
      padding: 12px 44px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #0e7c8a, #14a3b8);
      color: #fff;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 18px rgba(14,124,138,0.5);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .spin-btn:hover { background: linear-gradient(135deg, #0a5f6a, #0e7c8a); box-shadow: 0 6px 22px rgba(14,124,138,0.6); }
    .spin-btn:active { transform: scale(0.97); }
    .spin-btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }

    .result-box {
      min-height: 48px;
      font-size: 18px;
      font-weight: 600;
      color: #0a4f5c;
      text-align: center;
      padding: 10px 28px;
      border-radius: 12px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      border: 1.5px solid rgba(255,255,255,0.5);
      width: 360px;
      display: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }

    /* ── Editor ── */
    .editor {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 16px;
      padding: 1.5rem;
      width: 360px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }

    .editor h3 {
      font-size: 15px;
      font-weight: 600;
      color: #0a4f5c;
      margin-bottom: 14px;
    }

    .col-headers {
      display: grid;
      grid-template-columns: 1fr 90px 52px 32px;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #999;
      margin-bottom: 6px;
      padding: 0 2px;
    }

    .entries-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
      max-height: 280px;
      overflow-y: auto;
      padding-right: 2px;
    }

    .entries-list::-webkit-scrollbar { width: 4px; }
    .entries-list::-webkit-scrollbar-thumb { background: #bbb; border-radius: 4px; }

    .entry-row {
      display: grid;
      grid-template-columns: 1fr 90px 52px 32px;
      gap: 8px;
      align-items: center;
    }

    .entry-row input[type=text],
    .entry-row input[type=number] {
      font-size: 13px;
      padding: 6px 10px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
      background: #fafafa;
      color: #1a1a1a;
      width: 100%;
      transition: border-color 0.15s;
    }

    .entry-row input[type=text]:focus,
    .entry-row input[type=number]:focus {
      outline: none;
      border-color: #14a3b8;
      background: #fff;
    }

    .entry-row input[type=number] { text-align: right; }

    .entry-row input[type=color] {
      height: 34px;
      width: 52px;
      padding: 3px 4px;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
      cursor: pointer;
      background: #fafafa;
    }

    .del-btn {
      width: 32px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      background: #fafafa;
      color: #bbb;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .del-btn:hover { background: #fff0f0; color: #e24b4a; border-color: #f9c1c1; }

    .add-btn {
      width: 100%;
      padding: 9px;
      font-size: 13px;
      border: 1.5px dashed #c8c8c8;
      border-radius: 8px;
      background: transparent;
      color: #0a5f6a;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .add-btn:hover { background: #e8f8fa; color: #0e7c8a; border-color: #14a3b8; }

    .total-row {
      font-size: 12px;
      color: #999;
      text-align: right;
      padding-top: 8px;
      border-top: 1px solid #f0f0f0;
      margin-top: 6px;
    }

    .total-row .total-val { color: #1a1a1a; font-weight: 600; }
    .total-warn { color: #e24b4a; display: none; font-weight: 600; }

    /* ── History ── */
    .history-panel {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 16px;
      padding: 1.25rem;
      width: 100%;
      max-width: 1000px;
      margin-top: 2rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }

    .history-panel h3 {
      font-size: 15px;
      font-weight: 600;
      color: #0a4f5c;
      margin-bottom: 10px;
    }

    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .history-chip {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      background: #0e7c8a;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    }

    .history-empty {
      color: #aaa;
      font-size: 13px;
    }

    /* ── YouTube music player ── */
    .music-player-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 99;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      background: rgba(5, 40, 50, 0.85);
      backdrop-filter: blur(14px);
      border-top: 1px solid rgba(255,255,255,0.1);
      transition: transform 0.4s ease;
    }
    .music-player-bar.hidden {
      transform: translateY(100%);
    }
    .music-player-bar .track-info {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }
    .music-player-bar .track-cover {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: linear-gradient(135deg, #0e7c8a, #1bc5db);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .music-player-bar .track-text {
      min-width: 0;
    }
    .music-player-bar .track-title {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .music-player-bar .track-artist {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }
    .music-player-bar .play-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: #1ed760;
      color: #000;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s;
      flex-shrink: 0;
    }
    .music-player-bar .play-btn:hover { background: #1fdf64; transform: scale(1.08); }
    .music-player-bar .play-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .music-player-bar .spotify-link {
      color: #1ed760;
      font-size: 13px;
      text-decoration: none;
      white-space: nowrap;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    .music-player-bar .spotify-link:hover { opacity: 0.7; }

    #ytPlayerContainer {
      position: fixed;
      bottom: -300px;
      left: -300px;
      width: 1px;
      height: 1px;
      overflow: hidden;
      pointer-events: none;
    }

    /* ── Audio panel ── */
    .audio-panel {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(10, 60, 70, 0.7);
      backdrop-filter: blur(14px);
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 28px;
      padding: 8px 16px 8px 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      transition: all 0.3s ease;
    }

    .audio-panel .panel-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s;
      flex-shrink: 0;
    }
    .audio-panel .panel-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.08); }
    .audio-panel .panel-btn.active { background: rgba(30,215,96,0.5); }

    .audio-panel .divider {
      width: 1px;
      height: 24px;
      background: rgba(255,255,255,0.2);
      flex-shrink: 0;
    }

    .audio-panel .volume-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .audio-panel .volume-icon {
      color: rgba(255,255,255,0.7);
      font-size: 16px;
      cursor: pointer;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .audio-panel .volume-icon:hover { color: #fff; }

    .audio-panel .volume-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 90px;
      height: 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.2);
      outline: none;
      cursor: pointer;
      transition: background 0.15s;
    }
    .audio-panel .volume-slider:hover { background: rgba(255,255,255,0.3); }
    .audio-panel .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #1ed760;
      border: 2px solid #fff;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      transition: transform 0.15s;
    }
    .audio-panel .volume-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
    .audio-panel .volume-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #1ed760;
      border: 2px solid #fff;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
    .audio-panel .volume-pct {
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      font-weight: 600;
      min-width: 28px;
      text-align: right;
      flex-shrink: 0;
    }

    @media (max-width: 600px) {
      .audio-panel { padding: 6px 12px 6px 8px; gap: 6px; }
      .audio-panel .volume-slider { width: 60px; }
    }

    @media (max-width: 600px) {
      .wheel-wrapper { width: 290px; height: 290px; }
      #wheelCanvas { width: 290px !important; height: 290px !important; }
      .result-box { width: 290px; }
      .editor { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Fond océan animé -->
  <div class="ocean-bg"></div>
  <canvas id="oceanCanvas"></canvas>
  <!-- Rayons de lumière générés par JS -->
  <div id="lightRays"></div>

  <!-- YouTube player (caché, sert de source audio) -->
  <div id="ytPlayerContainer">
    <div id="ytPlayer"></div>
  </div>

  <!-- Barre de musique en bas -->
  <div class="music-player-bar hidden" id="musicPlayerBar">
    <div class="track-info">
      <div class="track-cover">🌊</div>
      <div class="track-text">
        <div class="track-title">distant ocean</div>
        <div class="track-artist">alyzea</div>
      </div>
    </div>
    <button class="play-btn" id="musicPlayBtn" disabled aria-label="Lecture / Pause">
      <i class="ti ti-player-play" id="musicPlayIcon"></i>
    </button>
    <a class="spotify-link" href="https://open.spotify.com/track/1e2GFDc9UFo0sdLIJ0KQMd" target="_blank" rel="noopener" title="Écouter sur Spotify">
      <i class="ti ti-brand-spotify"></i> Spotify
    </a>
  </div>

  <!-- Panneau audio -->
  <div class="audio-panel" id="audioPanel">
    <!-- Bouton musique -->
    <button class="panel-btn" id="musicToggle" aria-label="Lecteur musique" title="distant ocean — alyzea">
      <i class="ti ti-music"></i>
    </button>
    <div class="divider"></div>
    <!-- Volume -->
    <div class="volume-group">
      <i class="ti ti-volume volume-icon" id="volumeIcon" title="Muet / Activer"></i>
      <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="50" aria-label="Volume">
      <span class="volume-pct" id="volumePct">50%</span>
    </div>
  </div>

  <h1>🎡 Roue de la Chance</h1>
  <p class="subtitle">Personnalisez les cases, les probabilités et tournez !</p>

  <div class="main-layout">

    <div class="wheel-area">
      <div class="wheel-wrapper">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="360" height="360" role="img" aria-label="Roue de la chance"></canvas>
      </div>
      <button class="spin-btn" id="spinBtn" aria-label="Lancer la roue">
        <i class="ti ti-player-play"></i> Tourner !
      </button>
      <div class="result-box" id="resultBox" role="status" aria-live="polite"></div>
    </div>

    <div class="editor">
      <h3>⚙️ Configurer les cases</h3>
      <div class="col-headers">
        <span>Nom</span>
        <span>Prob. (%)</span>
        <span>Couleur</span>
        <span></span>
      </div>
      <div class="entries-list" id="entriesList" role="list"></div>
      <button class="add-btn" id="addBtn" aria-label="Ajouter une case">
        <i class="ti ti-plus"></i> Ajouter une case
      </button>
      <div class="total-row">
        Total : <span class="total-val" id="totalPct">0</span>%
        <span class="total-warn" id="totalWarn"> — doit être exactement 100%</span>
      </div>
    </div>

  </div>

  <!-- Historique des résultats -->
  <div class="history-panel">
    <h3>📋 Historique des tirages</h3>
    <div class="history-list" id="historyList">
      <span class="history-empty">Aucun tirage pour le moment…</span>
    </div>
  </div>

  <script>
    /* ═══════════════════════════════════════════
       YouTube IFrame API — distant ocean (alyzea)
       Volume contrôlé par le slider !
    ═══════════════════════════════════════════ */
    let ytPlayer = null;
    let ytReady = false;
    let isPlaying = false;
    let currentVolume = 50;
    let isMuted = false;

    // Charger l'API YouTube
    const ytScript = document.createElement('script');
    ytScript.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(ytScript);

    let autoStarted = false;

    window.onYouTubeIframeAPIReady = function() {
      ytPlayer = new YT.Player('ytPlayer', {
        height: '1',
        width: '1',
        videoId: 'tXfFJ2zyeYU', // distant ocean - alyzea
        playerVars: {
          autoplay: 1,
          controls: 0,
          disablekb: 1,
          fs: 0,
          modestbranding: 1,
          rel: 0,
          showinfo: 0,
          loop: 1,
          playlist: 'tXfFJ2zyeYU' // nécessaire pour le loop
        },
        events: {
          onReady: function(event) {
            ytReady = true;
            // Démarrer en muet pour contourner le blocage autoplay des navigateurs
            ytPlayer.mute();
            ytPlayer.playVideo();
            document.getElementById('musicPlayBtn').disabled = false;
          },
          onStateChange: function(event) {
            if (event.data === YT.PlayerState.PLAYING) {
              isPlaying = true;
              document.getElementById('musicPlayIcon').className = 'ti ti-player-pause';
            } else {
              isPlaying = false;
              document.getElementById('musicPlayIcon').className = 'ti ti-player-play';
            }
          }
        }
      });
    };

    // Activer le son au premier clic (les navigateurs bloquent l'autoplay avec son)
    document.addEventListener('click', function enableAudioOnFirstClick() {
      if (autoStarted || !ytReady || !ytPlayer) return;
      autoStarted = true;
      ytPlayer.unMute();
      ytPlayer.setVolume(currentVolume);
      document.removeEventListener('click', enableAudioOnFirstClick);
    }, { once: false });

    /* ── Barre de musique ── */
    let musicBarVisible = false;

    document.getElementById('musicToggle').addEventListener('click', function() {
      musicBarVisible = !musicBarVisible;
      const bar = document.getElementById('musicPlayerBar');
      const btn = document.getElementById('musicToggle');

      if (musicBarVisible) {
        bar.classList.remove('hidden');
        btn.classList.add('active');
      } else {
        bar.classList.add('hidden');
        btn.classList.remove('active');
      }
    });

    // Play / Pause
    document.getElementById('musicPlayBtn').addEventListener('click', function() {
      if (!ytReady || !ytPlayer) return;

      if (isPlaying) {
        ytPlayer.pauseVideo();
      } else {
        ytPlayer.playVideo();
      }
    });

    /* ── Volume : contrôle la musique YouTube ── */

    function setAllVolume(val) {
      currentVolume = val;
      // YouTube
      if (ytReady && ytPlayer) {
        ytPlayer.setVolume(val);
      }
    }

    function toggleMute() {
      isMuted = !isMuted;
      const icon = document.getElementById('volumeIcon');
      const slider = document.getElementById('volumeSlider');

      if (isMuted) {
        if (ytReady && ytPlayer) ytPlayer.setVolume(0);
        icon.className = 'ti ti-volume-off volume-icon';
        slider.value = 0;
        document.getElementById('volumePct').textContent = '0%';
      } else {
        const restore = currentVolume > 0 ? currentVolume : 50;
        currentVolume = restore;
        if (ytReady && ytPlayer) ytPlayer.setVolume(restore);
        icon.className = 'ti ti-volume volume-icon';
        slider.value = restore;
        document.getElementById('volumePct').textContent = restore + '%';
      }
    }

    // Slider de volume → contrôle YouTube
    document.getElementById('volumeSlider').addEventListener('input', function() {
      const val = parseInt(this.value);
      isMuted = val === 0;
      currentVolume = val;

      const icon = document.getElementById('volumeIcon');
      icon.className = val === 0 ? 'ti ti-volume-off volume-icon' : 'ti ti-volume volume-icon';
      document.getElementById('volumePct').textContent = val + '%';

      setAllVolume(val);
    });

    // Clic sur l'icône volume → mute/unmute
    document.getElementById('volumeIcon').addEventListener('click', toggleMute);

    /* ═══════════════════════════════════════════
       Océan Canvas — Vagues réalistes animées
    ═══════════════════════════════════════════ */
    (function initOcean() {
      const canvas = document.getElementById('oceanCanvas');
      const ctx = canvas.getContext('2d');
      let W, H, time = 0;

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      // Paramètres des vagues (couche, amplitude, fréquence, vitesse, couleur, yBase)
      const waveLayers = [
        { amp: 28, freq: 0.006, speed: 0.012, yBase: 0.62, color: 'rgba(8, 80, 110, 0.35)' },
        { amp: 22, freq: 0.009, speed: 0.018, yBase: 0.66, color: 'rgba(14, 130, 170, 0.30)' },
        { amp: 18, freq: 0.012, speed: 0.025, yBase: 0.70, color: 'rgba(20, 165, 196, 0.28)' },
        { amp: 14, freq: 0.015, speed: 0.032, yBase: 0.74, color: 'rgba(24, 197, 223, 0.25)' },
        { amp: 10, freq: 0.020, speed: 0.040, yBase: 0.78, color: 'rgba(77, 217, 232, 0.22)' },
        { amp: 7,  freq: 0.028, speed: 0.050, yBase: 0.82, color: 'rgba(138, 238, 230, 0.20)' },
        { amp: 5,  freq: 0.035, speed: 0.060, yBase: 0.86, color: 'rgba(192, 247, 240, 0.18)' },
      ];

      // Dessiner une seule couche de vague
      function drawWave(layer, t) {
        ctx.beginPath();
        ctx.moveTo(0, H);
        for (let x = 0; x <= W; x += 3) {
          const y = layer.yBase * H
            + Math.sin(x * layer.freq + t * layer.speed * 60) * layer.amp
            + Math.sin(x * layer.freq * 1.8 + t * layer.speed * 40 + 1.5) * layer.amp * 0.4
            + Math.sin(x * layer.freq * 0.5 + t * layer.speed * 20 + 3.0) * layer.amp * 0.25;
          ctx.lineTo(x, y);
        }
        ctx.lineTo(W, H);
        ctx.closePath();
        ctx.fillStyle = layer.color;
        ctx.fill();
      }

      // Reflets / mousse sur les crêtes
      function drawFoam(t) {
        ctx.save();
        ctx.globalAlpha = 0.12;
        for (let i = 0; i < 40; i++) {
          const baseX = (i * W / 40 + t * 15) % W;
          const baseY = 0.68 * H + Math.sin(baseX * 0.01 + t * 0.8) * 18;
          const size = 2 + Math.sin(t * 2 + i) * 1.5;
          ctx.beginPath();
          ctx.arc(baseX, baseY, Math.max(1, size), 0, Math.PI * 2);
          ctx.fillStyle = '#fff';
          ctx.fill();
        }
        ctx.restore();
      }

      // Particules flottantes (plancton lumineux)
      const particles = [];
      for (let i = 0; i < 30; i++) {
        particles.push({
          x: Math.random() * 2000,
          y: Math.random() * 1200,
          size: 1 + Math.random() * 2.5,
          speedX: (Math.random() - 0.5) * 0.3,
          speedY: (Math.random() - 0.5) * 0.2,
          pulse: Math.random() * Math.PI * 2
        });
      }

      function drawParticles(t) {
        ctx.save();
        particles.forEach(p => {
          p.x += p.speedX;
          p.y += p.speedY;
          if (p.x < 0) p.x = W;
          if (p.x > W) p.x = 0;
          if (p.y < 0) p.y = H;
          if (p.y > H) p.y = 0;
          const alpha = 0.15 + Math.sin(t * 1.5 + p.pulse) * 0.12;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(180, 255, 245, ${Math.max(0, alpha)})`;
          ctx.fill();
        });
        ctx.restore();
      }

      function animate() {
        time += 0.016;
        ctx.clearRect(0, 0, W, H);

        // Dessiner les vagues de l'arrière vers l'avant
        waveLayers.forEach(layer => drawWave(layer, time));

        // Mousse
        drawFoam(time);

        // Particules
        drawParticles(time);

        requestAnimationFrame(animate);
      }
      animate();
    })();

    /* ═══════════════════════════════════════════
       Bulles d'océan (générées dynamiquement)
    ═══════════════════════════════════════════ */
    function createBubbles() {
      const count = 22;
      for (let i = 0; i < count; i++) {
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        const size = 4 + Math.random() * 28;
        const hue = 170 + Math.random() * 30;
        bubble.style.width = size + 'px';
        bubble.style.height = size + 'px';
        bubble.style.left = Math.random() * 100 + '%';
        bubble.style.bottom = '-' + size + 'px';
        bubble.style.background = `radial-gradient(circle at 35% 35%, rgba(255,255,255,0.35), rgba(${120+Math.random()*40},${220+Math.random()*35},${230+Math.random()*25},0.12))`;
        bubble.style.border = `1px solid rgba(255,255,255,${0.08 + Math.random() * 0.12})`;
        bubble.style.animationDuration = (10 + Math.random() * 18) + 's';
        bubble.style.animationDelay = (Math.random() * 15) + 's';
        document.body.appendChild(bubble);
      }
    }
    createBubbles();

    /* ── Caustiques lumineuses ── */
    function createCaustics() {
      const count = 12;
      for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'caustic';
        const size = 60 + Math.random() * 150;
        el.style.width = size + 'px';
        el.style.height = size + 'px';
        el.style.left = Math.random() * 100 + '%';
        el.style.bottom = Math.random() * 40 + '%';
        el.style.background = `radial-gradient(circle, rgba(${100+Math.random()*80},${230+Math.random()*25},${220+Math.random()*35},0.25), transparent 70%)`;
        el.style.animationDuration = (12 + Math.random() * 20) + 's';
        el.style.animationDelay = (Math.random() * 12) + 's';
        document.body.appendChild(el);
      }
    }
    createCaustics();

    /* ── Rayons de lumière depuis la surface ── */
    function createLightRays() {
      const container = document.getElementById('lightRays');
      const count = 5;
      for (let i = 0; i < count; i++) {
        const ray = document.createElement('div');
        ray.className = 'light-ray';
        const leftPos = 5 + Math.random() * 90;
        const angle = -15 + Math.random() * 30;
        const maxOpacity = 0.04 + Math.random() * 0.06;
        ray.style.left = leftPos + '%';
        ray.style.setProperty('--ray-angle', angle + 'deg');
        ray.style.setProperty('--ray-max-opacity', maxOpacity);
        ray.style.background = `linear-gradient(180deg, rgba(180,255,245,0.3) 0%, rgba(100,230,220,0.1) 40%, transparent 100%)`;
        ray.style.animationDuration = (6 + Math.random() * 8) + 's';
        ray.style.animationDelay = (Math.random() * 6) + 's';
        ray.style.width = (80 + Math.random() * 100) + 'px';
        container.appendChild(ray);
      }
    }
    createLightRays();

    /* ═══════════════════════════════════════════
       Constantes & état
    ═══════════════════════════════════════════ */
    const COLORS = [
      '#7F77DD','#1D9E75','#D85A30','#378ADD','#D4537E',
      '#639922','#BA7517','#E24B4A','#534AB7','#0F6E56',
      '#993C1D','#185FA5','#993356','#3B6D11','#854F0B'
    ];

    const STORAGE_KEY = 'roue_de_la_chance_entries';
    const HISTORY_KEY = 'roue_de_la_chance_history';

    const DEFAULT_ENTRIES = [
      { name: 'Case 1', pct: 25, color: COLORS[0] },
      { name: 'Case 2', pct: 25, color: COLORS[1] },
      { name: 'Case 3', pct: 25, color: COLORS[2] },
      { name: 'Case 4', pct: 25, color: COLORS[3] },
    ];

    let entries = loadEntries();
    let history = loadHistory();
    let spinning = false, currentAngle = 0;

    /* ═══════════════════════════════════════════
       Persistance (localStorage)
    ═══════════════════════════════════════════ */
    function loadEntries() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed) && parsed.length > 0) return parsed;
        }
      } catch(e) { /* ignore */ }
      return JSON.parse(JSON.stringify(DEFAULT_ENTRIES));
    }

    function saveEntries() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); } catch(e) { /* ignore */ }
    }

    function loadHistory() {
      try {
        const raw = localStorage.getItem(HISTORY_KEY);
        if (raw) return JSON.parse(raw);
      } catch(e) { /* ignore */ }
      return [];
    }

    function saveHistory() {
      try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(0, 20))); } catch(e) { /* ignore */ }
    }

    /* ═══════════════════════════════════════════
       Utilitaires
    ═══════════════════════════════════════════ */
    function escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    /* ═══════════════════════════════════════════
       Gestion des entrées (CRUD)
    ═══════════════════════════════════════════ */
    function addEntry() {
      entries.push({ name: 'Nouvelle case', pct: 0, color: COLORS[entries.length % COLORS.length] });
      saveEntries();
      render();
    }

    function removeEntry(i) {
      if (entries.length <= 1) return;
      entries.splice(i, 1);
      saveEntries();
      render();
    }

    /* ═══════════════════════════════════════════
       Rendu de l'éditeur (SANS innerHTML pour les inputs)
    ═══════════════════════════════════════════ */
    function render() {
      const list = document.getElementById('entriesList');
      list.innerHTML = '';

      entries.forEach((e, i) => {
        const row = document.createElement('div');
        row.className = 'entry-row';
        row.setAttribute('role', 'listitem');

        // Input nom
        const nameInput = document.createElement('input');
        nameInput.type = 'text';
        nameInput.value = e.name;
        nameInput.placeholder = 'Nom';
        nameInput.setAttribute('aria-label', 'Nom de la case ' + (i + 1));
        nameInput.addEventListener('input', function() {
          entries[i].name = this.value;
          saveEntries();
          drawWheel();
        });

        // Input probabilité
        const pctInput = document.createElement('input');
        pctInput.type = 'number';
        pctInput.min = '0';
        pctInput.max = '100';
        pctInput.step = '0.1';
        pctInput.value = e.pct;
        pctInput.setAttribute('aria-label', 'Probabilité de la case ' + (i + 1));
        pctInput.addEventListener('input', function() {
          entries[i].pct = parseFloat(this.value) || 0;
          updateTotal();
          saveEntries();
          drawWheel();
        });

        // Input couleur
        const colorInput = document.createElement('input');
        colorInput.type = 'color';
        colorInput.value = e.color;
        colorInput.setAttribute('aria-label', 'Couleur de la case ' + (i + 1));
        colorInput.addEventListener('input', function() {
          entries[i].color = this.value;
          saveEntries();
          drawWheel();
        });

        // Bouton supprimer
        const delBtn = document.createElement('button');
        delBtn.className = 'del-btn';
        delBtn.title = 'Supprimer';
        delBtn.setAttribute('aria-label', 'Supprimer la case ' + (i + 1));
        delBtn.innerHTML = '<i class="ti ti-trash"></i>';
        delBtn.addEventListener('click', function() { removeEntry(i); });

        row.appendChild(nameInput);
        row.appendChild(pctInput);
        row.appendChild(colorInput);
        row.appendChild(delBtn);
        list.appendChild(row);
      });

      updateTotal();
      drawWheel();
    }

    /* ═══════════════════════════════════════════
       Total des probabilités (tolérance stricte)
    ═══════════════════════════════════════════ */
    function updateTotal() {
      const t = entries.reduce((s, e) => s + (parseFloat(e.pct) || 0), 0);
      document.getElementById('totalPct').textContent = Math.round(t * 10) / 10;
      document.getElementById('totalWarn').style.display = Math.abs(t - 100) > 0.01 ? 'inline' : 'none';
    }

    /* ═══════════════════════════════════════════
       Dessin de la roue (Canvas avec support Retina)
    ═══════════════════════════════════════════ */
    function setupCanvas() {
      const canvas = document.getElementById('wheelCanvas');
      const dpr = window.devicePixelRatio || 1;
      const displaySize = 360;
      canvas.width = displaySize * dpr;
      canvas.height = displaySize * dpr;
      canvas.style.width = displaySize + 'px';
      canvas.style.height = displaySize + 'px';
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      return { ctx, size: displaySize };
    }

    function drawWheel(angle) {
      const canvas = document.getElementById('wheelCanvas');
      const dpr = window.devicePixelRatio || 1;
      const size = 360; // taille logique

      // Redimensionner si nécessaire
      if (canvas.width !== size * dpr) {
        canvas.width = size * dpr;
        canvas.height = size * dpr;
        canvas.style.width = size + 'px';
        canvas.style.height = size + 'px';
      }

      const ctx = canvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, size, size);

      const cx = size / 2, cy = size / 2, r = size / 2 - 4;

      const total = entries.reduce((s, e) => s + (parseFloat(e.pct) || 0), 0);

      // Cas : total nul → roue grise
      if (total <= 0) {
        ctx.fillStyle = '#ccc';
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#999';
        ctx.font = '600 16px "Segoe UI", Arial, sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('Aucune donnée', cx, cy);
        return;
      }

      const a0 = angle !== undefined ? angle : currentAngle;
      let start = a0 - Math.PI / 2;

      entries.forEach((e, idx) => {
        const pctVal = parseFloat(e.pct) || 0;

        // Segment à 0% → zone grise ultra-fine (marqueur visuel)
        if (pctVal <= 0) {
          // Dessiner un mince trait gris pour montrer que la case existe
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.arc(cx, cy, r, start, start + 0.02);
          ctx.closePath();
          ctx.fillStyle = '#ddd';
          ctx.fill();
          start += 0.02;
          return;
        }

        const slice = (pctVal / total) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, start, start + slice);
        ctx.closePath();
        ctx.fillStyle = e.color;
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2.5;
        ctx.stroke();

        // Texte dans le segment
        if (slice > 0.06) {
          const mid = start + slice / 2;
          const tr = r * 0.62;
          ctx.save();
          ctx.translate(cx + Math.cos(mid) * tr, cy + Math.sin(mid) * tr);
          ctx.rotate(mid + Math.PI / 2);
          const fs = slice > 0.3 ? 14 : slice > 0.15 ? 12 : 10;
          ctx.font = `600 ${fs}px "Segoe UI", Arial, sans-serif`;
          ctx.fillStyle = '#fff';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          const maxW = r * 0.68;
          let txt = e.name;
          if (ctx.measureText(txt).width > maxW)
            txt = txt.substring(0, Math.floor(maxW / (fs * 0.6))) + '…';
          ctx.shadowColor = 'rgba(0,0,0,0.35)';
          ctx.shadowBlur = 4;
          ctx.fillText(txt, 0, 0);
          ctx.restore();
        }
        start += slice;
      });

      // Hub central
      ctx.beginPath();
      ctx.arc(cx, cy, 22, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.1)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Icône centrale
      ctx.font = '16px "Segoe UI Emoji", Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#0e7c8a';
      ctx.fillText('🎲', cx, cy);
    }

    /* ═══════════════════════════════════════════
       Détermination du gagnant
    ═══════════════════════════════════════════ */
    function getWinner(angle) {
      const total = entries.reduce((s, e) => s + (parseFloat(e.pct) || 0), 0);
      if (total <= 0) return null;
      let norm = ((angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      let pointer = (Math.PI * 2 - norm + Math.PI * 2 * 1.5) % (Math.PI * 2);
      let start = 0;
      // Parcourir toutes les entrées (y compris 0%) mais ajuster les angles
      for (const e of entries) {
        const pctVal = parseFloat(e.pct) || 0;
        if (pctVal <= 0) {
          start += 0.02; // même décalage que dans drawWheel
          continue;
        }
        const slice = (pctVal / total) * Math.PI * 2;
        if (pointer >= start && pointer < start + slice) return e;
        start += slice;
      }
      // Fallback : première entrée valide
      return entries.find(e => (parseFloat(e.pct) || 0) > 0) || null;
    }

    /* ═══════════════════════════════════════════
       Animation de rotation
    ═══════════════════════════════════════════ */
    function spin() {
      if (spinning) return;
      const total = entries.reduce((s, e) => s + (parseFloat(e.pct) || 0), 0);

      // Vérification stricte du total
      if (Math.abs(total - 100) > 0.01) {
        const box = document.getElementById('resultBox');
        box.style.display = 'block';
        box.innerHTML = '<span style="color:#e24b4a;">⚠️ Les probabilités doivent totaliser exactement 100% (actuel : ' + Math.round(total * 10) / 10 + '%)</span>';
        return;
      }

      // Vérifier qu'il y a au moins 2 cases avec pct > 0
      const validEntries = entries.filter(e => (parseFloat(e.pct) || 0) > 0);
      if (validEntries.length < 2) {
        const box = document.getElementById('resultBox');
        box.style.display = 'block';
        box.innerHTML = '<span style="color:#e24b4a;">⚠️ Il faut au moins 2 cases avec une probabilité > 0</span>';
        return;
      }

      spinning = true;
      document.getElementById('spinBtn').disabled = true;
      document.getElementById('resultBox').style.display = 'none';

      const extra = Math.PI * 2 * (8 + Math.random() * 6);
      const dur = 4000 + Math.random() * 1500;
      const startTime = performance.now();
      const startAngle = currentAngle;

      function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

      function frame(now) {
        const elapsed = now - startTime;
        const t = Math.min(elapsed / dur, 1);
        currentAngle = startAngle + extra * easeOut(t);
        drawWheel(currentAngle);
        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          spinning = false;
          document.getElementById('spinBtn').disabled = false;
          const winner = getWinner(currentAngle);
          const box = document.getElementById('resultBox');
          box.style.display = 'block';
          if (winner) {
            const safeName = escapeHTML(winner.name);
            box.innerHTML = '🎉 <strong style="color:' + winner.color + '">' + safeName + '</strong>';
            addToHistory(winner);
          } else {
            box.textContent = '';
          }
        }
      }
      requestAnimationFrame(frame);
    }

    /* ═══════════════════════════════════════════
       Historique des tirages
    ═══════════════════════════════════════════ */
    function addToHistory(winner) {
      const now = new Date();
      const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
      history.unshift({ name: winner.name, color: winner.color, time: timeStr });
      if (history.length > 20) history = history.slice(0, 20);
      saveHistory();
      renderHistory();
    }

    function renderHistory() {
      const list = document.getElementById('historyList');
      if (history.length === 0) {
        list.innerHTML = '<span class="history-empty">Aucun tirage pour le moment…</span>';
        return;
      }
      list.innerHTML = '';
      history.forEach(h => {
        const chip = document.createElement('span');
        chip.className = 'history-chip';
        chip.style.background = h.color;
        chip.textContent = h.time + ' — ' + h.name;
        list.appendChild(chip);
      });
    }

    /* ═══════════════════════════════════════════
       Événements
    ═══════════════════════════════════════════ */
    document.getElementById('spinBtn').addEventListener('click', spin);
    document.getElementById('addBtn').addEventListener('click', addEntry);

    // Support clavier : Espace / Entrée pour spinner
    document.addEventListener('keydown', function(e) {
      if (e.code === 'Space' && document.activeElement === document.getElementById('spinBtn')) {
        e.preventDefault();
        spin();
      }
    });

    /* ═══════════════════════════════════════════
       Initialisation
    ═══════════════════════════════════════════ */
    render();
    renderHistory();
  </script>
